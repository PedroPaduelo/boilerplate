server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: rotas como /users vão pra index.html, react-router resolve no client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo pra assets com hash (Vite gera nomes com hash tipo /assets/index-abc123.js)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache pro index.html (sempre revalidar pra pegar novo deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
