<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00a1b0" />
    <title>auditorIA</title>
    <script type="module">
      // React Grab — ferramenta de DEV (selecionar elementos e copiar o
      // contexto do componente React pra colar em IA). Só carrega em dev.
      //   instalado via: npm i -D react-grab
      // Atalho padrão mantido: segure Ctrl/⌘+C e solte sobre o elemento.
      if (import.meta.env.DEV) {
        import('react-grab').then(({ registerPlugin }) => {
          // Injeta a URL da página atual no início de TODO conteúdo copiado.
          registerPlugin({
            name: 'page-url',
            hooks: {
              transformCopyContent: async (content) =>
                `URL: ${window.location.href}\n\n${content}`,
            },
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
